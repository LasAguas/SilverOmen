  <style>
    /* ===== Links Page ===== */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3.5rem 1.5rem 4rem;
      position: relative;
      overflow-x: hidden;
    }

    .links-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .links-bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .links-bg-overlay-green {
      position: absolute;
      inset: 0;
      background: rgba(76, 137, 38, 0.15);
    }

    .links-page {
      position: relative;
      z-index: 1;
    }

    .links-page {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Artist name */
    .links-name {
      font-family: 'Protagonist', sans-serif;
      font-size: clamp(2rem, 8vw, 3rem);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    /* Cover art */
    .links-cover {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2.5rem;
      flex-shrink: 0;
    }

    .links-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Link buttons */
    .links-buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      margin-bottom: 3rem;
    }

    .links-btn {
      display: block;
      width: 100%;
      padding: 1rem 1.5rem;
      text-align: center;
      font-family: 'Brans', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #f8f8f8;
      border: 1px solid rgba(248, 248, 248, 0.25);
      border-radius: 4px;
      background: rgba(248, 248, 248, 0.05);
      transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
    }

    .links-btn:hover {
      background: rgba(157, 86, 218, 0.18);
      border-color: #9d56da;
      color: #f8f8f8;
    }

    .links-btn.links-btn-primary {
      background: #9d56da;
      border-color: #9d56da;
    }

    .links-btn.links-btn-primary:hover {
      background: #7a3fb8;
      border-color: #7a3fb8;
    }

    /* Expandable streaming panel */
    .links-expand-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .links-expand-btn .expand-arrow {
      display: inline-block;
      font-size: 0.6rem;
      transition: transform 0.25s ease;
      line-height: 1;
    }

    .links-expand-btn[aria-expanded="true"] .expand-arrow {
      transform: rotate(180deg);
    }

    .links-sub-buttons {
      display: none;
      flex-direction: column;
      gap: 0.6rem;
      width: 100%;
      margin-top: 0.6rem;
      padding-left: 0.75rem;
    }

    .links-sub-buttons.open {
      display: flex;
    }

    .links-sub-btn {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      width: 100%;
      padding: 0.7rem 1.25rem;
      text-align: left;
      font-family: 'Brans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f8f8f8;
      border: 1px solid rgba(248, 248, 248, 0.15);
      border-radius: 4px;
      background: rgba(248, 248, 248, 0.03);
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .links-sub-btn:hover {
      background: rgba(157, 86, 218, 0.14);
      border-color: rgba(157, 86, 218, 0.5);
      color: #f8f8f8;
    }

    .links-sub-btn img {
      width: 18px;
      height: 18px;
      object-fit: contain;
      flex-shrink: 0;
    }

    /* Social icons */
    .links-socials {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .links-social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      opacity: 0.6;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .links-social-link:hover {
      opacity: 1;
      transform: scale(1.15);
    }

    .links-social-link img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    @media (max-width: 768px) {
      body {
        justify-content: center;
      }

      .links-bg-image {
        height: 100vh;
        object-position: right top;
      }
    }
  </style>

  <script>
    function togglePrescription(btn) {
      var panel = document.getElementById('prescription-platforms');
      var expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      panel.classList.toggle('open', !expanded);
    }
  </script>
